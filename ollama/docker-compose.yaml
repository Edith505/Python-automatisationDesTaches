# docker compose up --build -d
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - C:/opt/ollama/models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
       reservations:
         devices:
           - driver: nvidia
             count: 1
             capabilities: [gpu]
    restart: unless-stopped

