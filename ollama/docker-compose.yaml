  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: ollama-setup
    environment:
      - OLLAMA_HOST=ollama:11434  # Indique au client de viser le conteneur 'ollama'
    volumes:
      - C:/opt/ollama/models:/root/.ollama
    entrypoint: /bin/sh
    command: -c "sleep 10 && ollama pull granite4:350m && ollama pull gemma4:e2b"
    depends_on:
      - ollama